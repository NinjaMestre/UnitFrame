[plugin]

name="UnitFrame"
description="A entities and components structure addon for 2D games that focuses on the automation of simple systems, which means unlike other component addons, this one doesn't have advanced systems ready for use, but it does have the ground for you to make your own components and modularize your tangled systems. Inherit from Entity2D to make your own entities and from Component to make your own components."
author="Ninja"
version="1.0"
script="unitframe.gd"
